name: Release artifacts

# Finalizes a tagged release. A remote SwiftPM binaryTarget REQUIRES a checksum, and the
# checksum only exists once the xcframework is built — which is after changesets has already
# created the tag. So this job builds the xcframework once, PINS Package.swift's fallback
# binaryTarget (url + checksum) and the vendored binding to THAT build, repoints the tag at
# the pinned commit, and uploads the assets.
#
# Shape 1 (tag-only pin): the pin commit is a child of the release commit, reachable only via
# the tag — main is deliberately NOT written (it may be branch-protected, and its fallback
# lagging one release is harmless: in-repo dev/CI use the TWOMLSPQ_LOCAL_XCFRAMEWORK build and
# external consumers resolve the tag). The retag is a force-update, but it lands BEFORE the
# assets are uploaded, so no consumer can resolve a usable-but-wrong tag.
#
# Idempotent: a re-dispatch on an ALREADY-pinned tag is a genuine no-op — build, pin, and
# upload are all skipped.
#
# TRIAL (2026-07, tracked in GER-1919): ASSET REUSE FOR SWIFT-ONLY RELEASES. NOTE it cannot
# fire until the SECOND release after it lands — the checksum it compares against must itself
# have been produced by the deterministic zip. Its failure mode is silent non-firing, so if you
# are here because you never saw it work, start at that issue.
#
# Most releases here change only the
# Swift wrapper, yet each one used to rebuild and republish the whole ~2.4 MB xcframework.
# Worse, the zip was not byte-reproducible (it embedded mtimes), so the republished binary
# got a NEW checksum despite being functionally identical — which meant nothing in the
# published artifacts could distinguish "the Rust binary changed" from "we rebuilt the same
# source on a different day", and consumers re-downloaded it either way.
#
# So buildIosDynamic.sh now produces a deterministic archive, and the "Reuse the published
# binary" step below skips pin+upload when this build's checksum equals the one Package.swift
# already pins. The checksum becomes the binary's identity, moving only when the binary moves.
#
# Why this is safe: equal checksums mean the archives are byte-identical, so reuse is
# definitionally correct, and any mismatch — including residual build nondeterminism we have
# not chased down — falls through to the normal publish path. There is no outcome where a
# stale binary ships. Worst case the trial simply never fires and we publish as before.
#
# What it changes for consumers: a tag's Package.swift may pin an EARLIER tag's asset. That is
# intended, and it is the signal that the binary did not change. The consequence to respect:
# release assets are now load-bearing for LATER tags, so do not delete them.
#
# Invoked automatically from release.yml when changesets publishes; dispatchable by hand to
# build and pin a tag that is not yet pinned.

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build, pin, and upload artifacts for"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, pin, and upload artifacts for (e.g. v0.8.0)"
        required: true
        type: string

jobs:
  finalize:
    name: XCFramework + pin + upload
    # CryptoKit's ML-KEM-768 primitives require the macOS 26 SDK — same pinned runner as
    # ci.yml's macos-cryptokit job.
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          # Full history + persisted credentials so the pin commit can be pushed and the tag
          # force-moved to it.
          fetch-depth: 0

      # Decide up front whether this tag is already pinned. If Package.swift's fallback url
      # already points at THIS tag's zip AND the zip asset is present, the tag was finalized in a
      # prior run — skip everything (a rebuild would not be byte-identical and would break the
      # existing pin). The asset check matters: a url pinned by hand (or by a run that then failed
      # to upload) with no asset must NOT skip, or the tag resolves to a 404.
      - name: Check whether the tag is already pinned
        id: pinned
        env:
          TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/TwoMLSPQ.xcframework.zip"
          asset_present=false
          if gh release view "${TAG}" --json assets --jq '.assets[].name' 2>/dev/null \
              | grep -qxF "TwoMLSPQ.xcframework.zip"; then
            asset_present=true
          fi
          if grep -qF "$url" Package.swift && [ "$asset_present" = true ]; then
            echo "Package.swift pins ${TAG} and its asset is present — nothing to build, pin, or upload"
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.pinned.outputs.already != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin

      - name: Cache cargo registry
        if: steps.pinned.outputs.already != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust/**/Cargo.toml', 'rust/rust-toolchain.toml') }}

      # The shipped configuration: CryptoKit backing both halves, dynamic framework bundles
      # (see the script header for why dynamic + framework). Writes buildIos/ + bindings/ at
      # the repo root.
      - name: Build XCFramework (cryptokit)
        if: steps.pinned.outputs.already != 'true'
        run: ./scripts/buildIosDynamic.sh

      - name: Compute SwiftPM checksum
        id: checksum
        if: steps.pinned.outputs.already != 'true'
        run: |
          # Run from rust/ (no Package.swift there) so compute-checksum never loads the
          # manifest — it only needs to hash the archive.
          sum=$(cd rust && swift package compute-checksum "$GITHUB_WORKSPACE/buildIos/TwoMLSPQ.xcframework.zip")
          echo "value=$sum" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$sum" | tee "$GITHUB_WORKSPACE/TwoMLSPQ.xcframework.zip.checksum"

      # Did this build actually produce a different binary? The comparand is Package.swift's
      # own pin, which by the RELEASE CONVENTION always names an ALREADY-RELEASED tag — it
      # lags through as many Swift-only releases as you like, always naming the last tag that
      # genuinely changed the binary. So when the checksums match there is nothing to do: the
      # pin in the tagged tree is already correct and already points at a live asset.
      #
      # The asset is re-verified before reuse. Skipping on a checksum match alone would ship a
      # 404 if the pinned release had been pruned, and reuse is exactly what makes older
      # assets load-bearing for newer tags.
      - name: Reuse the published binary when this build is byte-identical
        id: reuse
        if: steps.pinned.outputs.already != 'true'
        env:
          SUM: ${{ steps.checksum.outputs.value }}
        run: |
          set -euo pipefail
          python3 - > "$RUNNER_TEMP/pin.txt" <<'PY'
          import re, pathlib
          s = pathlib.Path("Package.swift").read_text()
          u = re.search(r'url:\s*"([^"]*TwoMLSPQ\.xcframework\.zip)"', s)
          c = re.search(r'checksum:\s*"([0-9a-f]{64})"', s)
          print(u.group(1) if u else "")
          print(c.group(1) if c else "")
          PY
          pinned_url=$(sed -n 1p "$RUNNER_TEMP/pin.txt")
          pinned_sum=$(sed -n 2p "$RUNNER_TEMP/pin.txt")

          if [ -z "$pinned_sum" ] || [ "$pinned_sum" != "$SUM" ]; then
            echo "binary changed (pinned=${pinned_sum:-none} built=${SUM}) — publishing"
            echo "reuse=false" >> "$GITHUB_OUTPUT"
          elif ! curl -fsIL -o /dev/null "$pinned_url"; then
            echo "::warning::checksum matches the pin but ${pinned_url} is unreachable — \
          publishing a fresh asset instead of reusing a missing one"
            echo "reuse=false" >> "$GITHUB_OUTPUT"
          else
            echo "reuse=true" >> "$GITHUB_OUTPUT"
            {
              echo "### XCFramework unchanged"
              echo
              echo "This build is byte-identical to the pinned binary, so no new asset was"
              echo "published. \`Package.swift\` keeps pointing at the last release that"
              echo "actually changed it."
              echo
              echo "- checksum: \`${SUM}\`"
              echo "- asset: ${pinned_url}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # Pin the fallback binaryTarget (url + checksum) and the vendored binding to THIS build,
      # then move the tag to the pin commit. Skipped when the tag is already pinned, and when
      # the build reproduced the pinned binary (nothing to rewrite — the pin is correct).
      - name: Pin Package.swift + binding and move the tag
        if: steps.pinned.outputs.already != 'true' && steps.reuse.outputs.reuse != 'true'
        env:
          TAG: ${{ inputs.tag }}
          SUM: ${{ steps.checksum.outputs.value }}
        run: |
          set -euo pipefail
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/TwoMLSPQ.xcframework.zip"
          python3 - "$url" "$SUM" <<'PY'
          import re, sys, pathlib
          url, checksum = sys.argv[1], sys.argv[2]
          p = pathlib.Path("Package.swift")
          s = p.read_text()
          # Target the binaryTarget's url specifically (ends in the zip name) so the
          # CommProtocol dependency url is never touched.
          s, n1 = re.subn(r'(url:\s*")[^"]*TwoMLSPQ\.xcframework\.zip(")',
                          lambda m: m.group(1) + url + m.group(2), s, count=1)
          s, n2 = re.subn(r'(checksum:\s*")[0-9a-f]{64}(")',
                          lambda m: m.group(1) + checksum + m.group(2), s, count=1)
          if n1 != 1 or n2 != 1:
              sys.exit(f"Package.swift pin failed (url matches={n1}, checksum matches={n2}) "
                       "— the binaryTarget layout changed")
          p.write_text(s)
          PY
          # Re-sync the vendored binding from THIS build so the tagged tree ships a matched
          # binding/binary pair.
          cp bindings/two_mls_pq.swift Sources/TwoMLSPQBinding/two_mls_pq.swift
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage exactly the two files we pinned — never a stray tracked change swept up by -a.
          git commit Package.swift Sources/TwoMLSPQBinding/two_mls_pq.swift \
            -m "Release ${TAG}: pin xcframework (${SUM}) + binding"
          git tag -f "${TAG}"
          git push origin --force "refs/tags/${TAG}"

      # Nothing is uploaded on a reuse: the tagged Package.swift's pin is the single source of
      # truth for where the binary lives, and an asset here would imply this release published
      # one. The step summary above records the decision.
      - name: Upload artifacts to release
        if: steps.pinned.outputs.already != 'true' && steps.reuse.outputs.reuse != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            buildIos/TwoMLSPQ.xcframework.zip \
            bindings/two_mls_pq.swift \
            bindings/two_mls_pqFFI.h \
            TwoMLSPQ.xcframework.zip.checksum \
            --clobber
