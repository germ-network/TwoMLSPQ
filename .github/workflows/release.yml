name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.ref == 'refs/heads/main' && github.repository_owner == 'germ-network' }}
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
      contents: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          check-latest: true
          cache: pnpm

      - name: Create Pull Request for next release or Publish a new github release
        id: changesets
        uses: changesets/action@v1
        with:
          title: Prepare next release
          createGithubReleases: true
          publish: pnpm release
          version: pnpm version-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the XCFramework, PIN Package.swift + the vendored binding to it (moving the
  # tag to the pin commit), and upload the assets — whenever the changesets step above
  # published a release. Chained here — rather than an `on: release` trigger — because
  # releases created with the workflow's own GITHUB_TOKEN do not fire other workflows.
  artifacts:
    name: Release artifacts
    needs: release
    if: ${{ needs.release.outputs.published == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release-artifacts.yml
    with:
      tag: v${{ fromJson(needs.release.outputs.publishedPackages)[0].version }}
