name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/**"
      - "deny.toml"
      - ".github/workflows/ci.yml"
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}

      - name: Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/download/0.9.3/taplo-full-linux-x86_64.gz \
            | gzip -d > /usr/local/bin/taplo
          chmod +x /usr/local/bin/taplo

      - name: Check TOML formatting
        run: taplo fmt --check

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      # `cryptokit` is Apple-only (linted/tested in the macos-cryptokit job); on Linux we
      # lint every other feature. `--features benchmark_util` keeps the default `rustcrypto`
      # plus the bench targets while leaving `cryptokit` off.
      - name: Clippy
        run: cargo clippy --all-targets --features benchmark_util -- -D warnings

      # The `cryptokit` feature must not build off-Apple (guarded by a compile_error! in the
      # crate). Assert the build fails, so a regression that makes it build on Linux is
      # caught here rather than silently "working".
      - name: cryptokit must not build on Linux (expected failure)
        run: |
          if cargo build -p two-mls-pq --no-default-features --features cryptokit 2>/dev/null; then
            echo "::error::cryptokit unexpectedly built on Linux; it is Apple-only"
            exit 1
          fi
          echo "cryptokit correctly fails to build on Linux"

      - name: Clippy (default features / rustcrypto, no cryptokit)
        run: cargo clippy --all-targets --no-default-features --features rustcrypto -- -D warnings

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check licenses and advisories
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --all-features
          command: check
          command-arguments: "licenses advisories sources"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}

      # `cryptokit` is Apple-only; the macos-cryptokit job runs the real ML-KEM-768 tests.
      # Here we run everything else (default `rustcrypto` + bench fixtures).
      - name: Test
        run: cargo test --features benchmark_util

      - name: Test (default features / rustcrypto, no cryptokit)
        run: cargo test --no-default-features --features rustcrypto

  bindgen-check:
    name: UniFFI bindgen check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}

      - name: Build two-mls-pq (default features)
        run: cargo build --package two-mls-pq

      - name: Run uniffi-bindgen (swift)
        run: |
          cargo run --package uniffi-bindgen -- generate \
            target/debug/libtwo_mls_pq.dylib \
            --library \
            --language swift \
            --out-dir /tmp/bindings

  msrv:
    name: MSRV (1.85, default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}

      # Default (rustcrypto) only: keeps the MSRV gate light and catches accidental use of
      # newer-than-1.85 language/stdlib features.
      - name: cargo check (rustcrypto, no cryptokit)
        run: cargo check --no-default-features --features rustcrypto

  macos-cryptokit:
    name: CryptoKit (macOS)
    # CryptoKit's ML-KEM-768 primitives require macOS 26, so pin the runner explicitly
    # rather than relying on the macos-latest migration.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cryptokit-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}

      - name: Clippy (cryptokit)
        run: cargo clippy -p two-mls-pq --all-targets --features cryptokit -- -D warnings

      - name: Test (cryptokit)
        run: cargo test -p two-mls-pq --features cryptokit
