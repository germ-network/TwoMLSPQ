name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "rust/**/Cargo.toml"
      - "rust/Cargo.lock"
      - "rust/rust-toolchain.toml"
      - "rust/.cargo/**"
      - "rust/deny.toml"
      - ".github/workflows/ci.yml"
      - "book/**"
      - "Package.swift"
      - "Sources/**"
      - "Tests/**"
      - "scripts/**"
  pull_request:
  # Manual runs, so a branch can get a full CI pass before a PR exists.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # The Cargo workspace lives in rust/; its .cargo/config.toml + rust-toolchain.toml are
    # discovered from the cwd, so all cargo/taplo steps run there.
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/**/Cargo.toml', 'rust/rust-toolchain.toml') }}

      - name: Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/download/0.9.3/taplo-full-linux-x86_64.gz \
            | gzip -d > /usr/local/bin/taplo
          chmod +x /usr/local/bin/taplo

      - name: Check TOML formatting
        run: taplo fmt --check

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      # aws-lc is the portable provider (both halves, real ML-KEM-768); `cryptokit` is
      # Apple-only and linted/tested in the macos-cryptokit job.
      - name: Clippy (awslc)
        run: cargo clippy --all-targets --features awslc,benchmark_util -- -D warnings

      # The `cryptokit` feature must not build off-Apple (guarded by a compile_error! in
      # providers.rs). Assert the build fails, so a regression that makes it build on
      # Linux is caught here rather than silently "working".
      - name: cryptokit must not build on Linux (expected failure)
        run: |
          if cargo build -p two-mls-pq --features cryptokit 2>/dev/null; then
            echo "::error::cryptokit unexpectedly built on Linux; it is Apple-only"
            exit 1
          fi
          echo "cryptokit correctly fails to build on Linux"

      # No provider feature selected must fail loudly (providers.rs compile_error!), so a
      # consumer that forgets to pick one gets the intended diagnosis.
      - name: no-provider build must fail (expected failure)
        run: |
          if cargo build -p two-mls-pq 2>/dev/null; then
            echo "::error::two-mls-pq unexpectedly built without a crypto provider feature"
            exit 1
          fi
          echo "no-provider build correctly fails"

      # apq itself is provider-free: it must build and lint with no provider anywhere.
      - name: Clippy (apq, no providers)
        run: cargo clippy -p apq --all-targets -- -D warnings

  book:
    name: Book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin
          chmod +x /usr/local/bin/mdbook

      - name: Build book
        run: mdbook build book

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check licenses and advisories
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # --manifest-path points cargo-deny at the relocated workspace (it reads deny.toml
          # from the manifest's directory, rust/).
          arguments: --all-features --manifest-path rust/Cargo.toml
          command: check
          command-arguments: "licenses advisories sources"

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/**/Cargo.toml', 'rust/rust-toolchain.toml') }}

      # The FULL suite — including every PQ (ML-KEM-768) path — on the portable aws-lc
      # provider. The macos-cryptokit job runs the same suite on Apple CryptoKit.
      - name: Test (awslc)
        run: cargo test --features awslc,benchmark_util

  bindgen-check:
    name: UniFFI bindgen check
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/**/Cargo.toml', 'rust/rust-toolchain.toml') }}

      # awslc here: the UniFFI surface is provider-independent, and macos-latest may lag
      # behind the macOS 26 SDK the cryptokit bridge needs (see macos-cryptokit).
      - name: Build two-mls-pq (awslc)
        run: cargo build -p two-mls-pq --features awslc

      - name: Run uniffi-bindgen (swift)
        run: |
          cargo run --package uniffi-bindgen -- generate \
            target/debug/libtwo_mls_pq.dylib \
            --library \
            --language swift \
            --out-dir /tmp/bindings

  msrv:
    name: MSRV (1.85, awslc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('rust/**/Cargo.toml', 'rust/rust-toolchain.toml') }}

      # Catches accidental use of newer-than-1.85 language/stdlib features across both
      # crates and the aws-lc dependency subtree (whose tightest member pins exactly 1.85).
      - name: cargo check (awslc)
        run: cargo check --features awslc

  macos-cryptokit:
    name: CryptoKit (macOS)
    # CryptoKit's ML-KEM-768 primitives require macOS 26, so pin the runner explicitly
    # rather than relying on the macos-latest migration.
    runs-on: macos-26
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-cryptokit-${{ hashFiles('rust/**/Cargo.toml', 'rust/rust-toolchain.toml') }}

      # --all-features also proves the cryptokit-beats-awslc precedence in providers.rs
      # (the combination a dev's `just lint` uses on an Apple machine).
      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (cryptokit)
        run: cargo test -p two-mls-pq --features cryptokit

      # Both provider flags in one build: providers.rs resolves the dual-feature build to
      # CryptoKit (the precedence a dev's --all-features hits), and the tests must still
      # pass under it — not merely compile.
      - name: Test (dual-provider build, cryptokit precedence)
        run: cargo test -p two-mls-pq --features cryptokit,awslc

      - name: Test (apq)
        run: cargo test -p apq --lib

      # CryptoKit ↔ awslc interop as its own gate: raw ML-KEM encap/decap, mixed-provider
      # MLS groups, archive blobs, the HPKE envelope, and — since the generic
      # CombinerClient lets one binary instantiate both provider stacks, no harness —
      # full cross-provider combiner sessions (establishment, APQ-PSK bind, messaging)
      # plus an A.3 PQ ratchet round, all in both directions. This is what keeps a
      # Linux/awslc peer wire-compatible with an Apple/CryptoKit peer.
      - name: Cross-provider interop (cryptokit <-> awslc)
        run: cargo test -p apq --test provider_interop

  swift:
    name: Swift package (macOS)
    # The atomic wire+adapter gate: build the cryptokit xcframework LOCALLY from rust/, sync
    # the vendored binding, and run the Swift tests against that build — no release needed to
    # test an integration change. macOS 26 for the CryptoKit ML-KEM-768 bridge.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-swift-${{ hashFiles('rust/**/Cargo.toml', 'rust/rust-toolchain.toml') }}

      # Builds all Apple slices, generates bindings/, assembles buildIos/TwoMLSPQ.xcframework.
      - name: Build dynamic xcframework
        run: bash scripts/buildIosDynamic.sh

      # The committed binding must match the freshly built binary (uniffi embeds a checksum
      # contract; the binding_contract_version canary guards it). Re-sync, then fail if the
      # tracked copy drifted from what this build generates.
      - name: Re-sync vendored binding
        run: cp bindings/two_mls_pq.swift Sources/TwoMLSPQ/two_mls_pq.swift

      - name: Assert vendored binding is in sync
        run: git diff --exit-code Sources/TwoMLSPQ/two_mls_pq.swift

      - name: Build tests (local xcframework)
        env:
          TWOMLSPQ_LOCAL_XCFRAMEWORK: "1"
        run: swift build --build-tests

      # SwiftPM does not stage a dynamic binaryTarget's framework into the test bundle's
      # @rpath (PackageFrameworks/), so dlopen fails at test load. Symlink the macOS slice in.
      - name: Stage framework for @rpath
        run: |
          PF=.build/out/Products/Debug/PackageFrameworks
          mkdir -p "$PF"
          ln -sf "$PWD/buildIos/TwoMLSPQ.xcframework/macos-arm64/two_mls_pqFFI.framework" \
            "$PF/two_mls_pqFFI.framework"

      - name: Swift test (local xcframework)
        env:
          TWOMLSPQ_LOCAL_XCFRAMEWORK: "1"
        run: swift test --skip-build
