name: Mermaid

# Every ```mermaid fence in the repo must PARSE, using the same renderer GitHub uses.
#
# This exists because the book's diagrams broke on GitHub and nothing caught it. The local
# build could not: mdbook-mermaid only rewraps a fence into `<div class="mermaid">` and lets
# the browser parse it at runtime, so `mdbook build` succeeds on a chart that renders as an
# error box for the reader. The failure was a `;` in message text — mermaid reads it as a
# statement separator — and it had been shipping, unnoticed, before the chapter even moved
# into this repo.
#
# mermaid-cli runs the real mermaid parser, so a chart that survives here is one GitHub can
# draw. It is pinned: GitHub tracks its own mermaid version, and a floating major here would
# start failing on syntax GitHub still accepts (or worse, stop failing on syntax it does
# not). Bump deliberately.

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/mermaid.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/mermaid.yml"
  workflow_dispatch:

jobs:
  parse:
    name: Diagrams parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mermaid-cli
        run: |
          npm install -g @mermaid-js/mermaid-cli@11.4.2
          # mermaid-cli parses by DRIVING a headless browser — it is the real renderer, not
          # a grammar reimplementation, which is the whole reason to prefer it. The cost is
          # that chromium must actually launch, and it cannot sandbox itself inside the
          # Actions container: without these flags every chart fails identically with
          # "Failed to launch the browser process", which looks exactly like every chart
          # being broken.
          npx --yes puppeteer browsers install chrome
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer.json

      - name: Parse every mermaid fence
        run: |
          set -uo pipefail
          # Extract each fence to its own file so a failure names the chart, not "the repo".
          python3 - <<'PY'
          import pathlib, re
          out = pathlib.Path("/tmp/charts"); out.mkdir(exist_ok=True)
          n = 0
          for md in pathlib.Path(".").rglob("*.md"):
              if "node_modules" in md.parts or "book/book" in str(md):
                  continue
              for i, block in enumerate(
                  re.findall(r"^```mermaid\n(.*?)^```", md.read_text(), re.S | re.M), 1
              ):
                  n += 1
                  name = f"{md.as_posix().replace('/', '__')}__chart{i}.mmd"
                  (out / name).write_text(block)
          print(f"extracted {n} charts")
          PY

          shopt -s nullglob
          charts=(/tmp/charts/*.mmd)
          if [ ${#charts[@]} -eq 0 ]; then
            echo "No mermaid charts found — nothing to check."
            exit 0
          fi

          fails=0
          for c in "${charts[@]}"; do
            name=$(basename "$c" .mmd)
            if err=$(mmdc --puppeteerConfigFile /tmp/puppeteer.json --input "$c" --output "/tmp/$name.svg" 2>&1); then
              echo "ok    $name"
            else
              fails=$((fails + 1))
              echo "FAIL  $name"
              # The chart's source, numbered, so the parser's line number is usable.
              echo "$err" | sed 's/^/        /'
              nl -ba "$c" | sed 's/^/        /'
            fi
          done

          echo
          echo "$((${#charts[@]} - fails))/${#charts[@]} charts parse"
          if [ "$fails" -eq "${#charts[@]}" ] && [ "${#charts[@]}" -gt 1 ]; then
            echo
            echo "EVERY chart failed. That is almost never the charts — it is this job."
            echo "Check the browser launched at all before believing the diagnostics above."
          fi
          exit $fails
