name: Pages

# Build the mdBook and deploy it to GitHub Pages.
# Requires: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    # Only rebuild when the book or this workflow changes.
    paths:
      - "book/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Least privilege: the deploy job needs to write Pages and mint an OIDC token; nothing writes
# to the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Do NOT cancel an in-progress deploy (GitHub Pages guidance) — let it
# finish rather than leave a half-published site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # mdBook 0.5.x is required: mdbook-mermaid 0.17 speaks the post-0.4 preprocessor
      # protocol, and pairing it with mdBook 0.4.x fails the build with the mermaid
      # preprocessor's "Unable to parse the input". This intentionally differs from ci.yml's
      # 0.4.40 "Build book" job, which does not run the mermaid preprocessor at all.
      - name: Install mdBook
        run: |
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.4/mdbook-v0.5.4-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin
          chmod +x /usr/local/bin/mdbook

      # book.toml declares `[preprocessor.mermaid] command = "mdbook-mermaid"`, so the binary
      # must be on PATH or `mdbook build` fails with "preprocessor 'mermaid' not found". Pinned
      # to the version that pairs with the mdBook above; the committed book/mermaid*.js do the
      # client-side rendering, this only rewraps the fences.
      - name: Install mdbook-mermaid
        run: cargo install mdbook-mermaid --version 0.17.0 --locked

      - name: Build book
        run: mdbook build book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
