[workspace]
members = ["two-mls-pq", "uniffi-bindgen"]
resolver = "3"

[workspace.package]
authors = ["Germ Network"]
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false
rust-version = "1.85"

[workspace.lints.rust]
unused_imports = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
expect_used = "deny"
panic = "deny"
unwrap_used = "deny"

[workspace.dependencies]
mls-rs = { version = "0.45", features = ["psk", "private_message", "serde"] }
mls-rs-crypto-awslc = { version = "0.15", git = "https://github.com/germ-mark/mls-rs", rev = "5224ee3afd6f9f026d579f3ed17a8fdda121946e", features = [
  "non-fips",
  "post-quantum",
] }
mls-rs-crypto-rustcrypto = { version = "0.15", git = "https://github.com/germ-mark/mls-rs", rev = "5224ee3afd6f9f026d579f3ed17a8fdda121946e" }
serde = { version = "1", features = ["derive"] }
thiserror = "1"
uniffi = "0.31"
zeroize = { version = "1", features = ["derive"] }

[patch.crates-io]
mls-rs = { git = "https://github.com/germ-mark/mls-rs", rev = "5224ee3afd6f9f026d579f3ed17a8fdda121946e" }
